<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5865f2"/>
      <stop offset="1" stop-color="#4752c4"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1200" height="400" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="398" rx="15" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- left: a rich-presence card motif -->
  <rect x="70" y="128" width="220" height="144" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <!-- large image -->
  <rect x="92" y="150" width="84" height="84" rx="12" fill="url(#accent)"/>
  <!-- small language badge -->
  <circle cx="176" cy="234" r="16" fill="#161b22" stroke="url(#accent)" stroke-width="4"/>
  <!-- text lines: details / state / timer -->
  <rect x="190" y="160" width="80" height="14" rx="7" fill="#e6edf3"/>
  <rect x="190" y="184" width="58" height="11" rx="5" fill="#8b949e"/>
  <rect x="190" y="205" width="42" height="9"  rx="4" fill="#6e7681"/>
  <!-- online / playing dot -->
  <circle cx="268" cy="150" r="8" fill="#23a55a" stroke="#0d1117" stroke-width="3"/>

  <!-- title -->
  <text x="360" y="150" font-family="ui-monospace, Menlo, monospace" font-size="38" font-weight="700" fill="#e6edf3">@gwynnnplaine/pi-discord-presence</text>

  <!-- tagline -->
  <text x="362" y="205" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="30" fill="#8b949e">live agent activity in your Discord status.</text>

  <!-- extension pill -->
  <rect x="362" y="242" width="134" height="36" rx="7" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="429" y="266" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="18" letter-spacing="1" fill="#5865f2">EXTENSION</text>

  <!-- install line -->
  <text x="362" y="335" xml:space="preserve" font-family="ui-monospace, Menlo, monospace" font-size="24" fill="#6e7681"><tspan fill="#5865f2">$ </tspan>pi install npm:@gwynnnplaine/pi-discord-presence</text>
</svg>
